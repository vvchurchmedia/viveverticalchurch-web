<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vive Vertical Church</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <img src="images/logo.png" alt="Vive Vertical Church Logo" />
        </div>
        <nav class="header-nav">
          <a
            href="https://viveverticalchurch.breezechms.com/give/online"
            target="_blank"
            class="giving-btn"
          >
            <img src="images/giving-button.png" alt="Giving - Donar" />
          </a>
        </nav>
      </div>
    </header>

    <!-- Hero / Bienvenidos -->
    <section class="hero">
      <img
        src="images/bienvenidos.png"
        alt="Bienvenidos - Welcome to Vive Vertical Church"
      />
    </section>

    <!-- Middle Two-Column Section -->
    <section class="middle-section">
      <div class="middle-grid">
        <!-- Row 1: Horario + Map/Address -->
        <div class="middle-cell">
          <img src="images/horario.jpeg" alt="Horario - Service Schedule" />
        </div>
        <div class="middle-cell">
          <div class="map-container">
            <iframe
              src="https://maps.google.com/maps?q=830+Mayfield+Rd+Unit+560,+Grand+Prairie,+TX+75052&t=&z=15&ie=UTF8&iwloc=&output=embed"
              width="600"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            >
            </iframe>
          </div>
          <img
            src="images/ubicacion.png"
            alt="Ubicacion - Location with QR Code"
          />
        </div>
      </div>
    </section>

    <!-- Photo Gallery -->
    <section class="gallery">
      <div class="gallery-grid">
        <img src="images/fotos-05.png" alt="Community photo 1" />
        <img src="images/fotos-06.png" alt="Community photo 2" />
        <img src="images/fotos-08.png" alt="Community photo 3" />
        <img src="images/fotos-07.png" alt="Community photo 4" />
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="social-links">
        <a
          href="https://www.facebook.com/profile.php?id=61552775499711"
          target="_blank"
          aria-label="Facebook"
        >
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
            />
          </svg>
        </a>
        <a
          href="https://instagram.com/viveverticalchurch"
          target="_blank"
          aria-label="Instagram"
        >
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
            />
          </svg>
        </a>
        <a
          href="https://www.youtube.com/@viveverticalchurch"
          target="_blank"
          aria-label="YouTube"
        >
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path
              d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
            />
          </svg>
        </a>
      </div>
      <p class="copyright">
        &copy;
        <script>
          document.write(new Date().getFullYear());
        </script>
        Vive Vertical Church. All rights reserved.
      </p>
    </footer>
  </body>
</html>
